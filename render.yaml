services:
  - type: web
    name: pixel-vault-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pixel-vault-db
          property: connectionString
      - key: JWT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: pixel-vault-db
    databaseName: pixelvault
    user: pixelvault_user
    plan: free
