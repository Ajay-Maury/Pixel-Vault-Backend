version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pixelvault-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pixelvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pixelvault}
      POSTGRES_DB: ${POSTGRES_DB:-pixelvault}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pixelvault}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pixelvault-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/minio_root
    command: server /minio_root --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  app:
    build: .
    container_name: pixelvault-app
    environment:
      PORT: ${PORT:-5000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-pixelvault}:${POSTGRES_PASSWORD:-pixelvault}@postgres:5432/${POSTGRES_DB:-pixelvault}
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-pixelvault}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  minio_data:
